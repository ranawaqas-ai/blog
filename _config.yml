# Site
name: "Rana Waqas"
title: "Rana Waqas"
description: "A Machine Learning Journey, To AGI"
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
url: "https://blog.waqasrana.space"
baseurl: ""
permalink: /posts/:title/

google_analytics: 'G-ERD23968FK'

# Authors
authors:
  waqas:
    name: waqas
    display_name: Rana Waqas
    avatar: 'assets/images/avatar.png'
    email: waqaskhan137@gmail.com
    web: https://github.com/waqaskhan137
    twitter: https://twitter.com/waqas137
    description: "Machine learning engineer on a journey towards AGI. Writing about ML, MLOps, and software engineering."

# Giscus comments
giscus:
  repo: waqaskhan137/ranawaqas
  repo_id: R_kgDOK3YJYQ
  category: Announcements
  category_id: DIC_kwDOK3YJYc4Cbn4P
  mapping: pathname
  reactions_enabled: 1
  input_position: bottom
  lang: en

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

# Archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: archive
  permalinks:
    category: '/category/:name/'
    tag: '/tag/:name/'

# Pagination
paginate: 8
paginate_path: /page:num/

# Pages
include: ["_pages"]

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: waqas
      comments: true

# Lazy Images
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock, vendor]
