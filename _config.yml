# The Site Configuration
# Theme is vendored in this repo (ejected from jekyll-theme-chirpy 7.5.0).
# The gem auto-required its plugin dependencies; now they must be listed here.
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-include-cache

lang: en
timezone: Asia/Karachi

title: Rana Waqas
tagline: AI Engineer · LLM Reliability
description: "Rana Waqas, AI engineer and engineering leader. I build and ship AI products in industry, and I research the hard problems in LLMs: hallucination, metacognition, and model architecture. MSc Generative AI at the University of Exeter."

url: "https://blog.waqasrana.space"
baseurl: ""

github:
  username: ranawaqas-ai
twitter:
  username: waqas137
  card: summary_large_image
social:
  name: Rana Waqas
  email: waqaskhan137@gmail.com
  links:
    - https://www.linkedin.com/in/ranamuhammadwaqas
    - https://github.com/ranawaqas-ai
    - https://orcid.org/0009-0005-0868-1984

analytics:
  google:
    id: G-ERD23968FK

theme_mode: # [light|dark] — empty follows system preference

cdn:
avatar: /assets/img/profile.png
toc: true

comments:
  provider: giscus
  giscus:
    repo: ranawaqas-ai/blog
    repo_id: R_kgDOK3YJYQ
    category: Announcements
    category_id: DIC_kwDOK3YJYc4Cbn4P
    mapping: pathname
    input_position: bottom
    lang: en
    reactions_enabled: 1
    crossorigin: anonymous

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - vendor
  - _research
  - BLOG_QUEUE.md

jekyll-archives:
  enabled: []
