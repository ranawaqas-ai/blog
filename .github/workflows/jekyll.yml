# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.310.0
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 3
      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --
      - name: Compile D2 diagrams to SVG
        run: |
          find . -name "*.d2" | while read f; do
            out="${f%.d2}.svg"
            d2 --sketch --theme 0 "$f" "$out"
            # D2 omits width/height on root SVG — add them so <img height:auto> works
            python3 - "$out" <<'PYEOF'
          import re, sys
          content = open(sys.argv[1]).read()
          svg_tag = re.search(r'<svg\b[^>]*>', content)
          vb = re.search(r'viewBox="0 0 (\d+) (\d+)"', content)
          if svg_tag and vb and 'width=' not in svg_tag.group(0):
              w, h = vb.group(1), vb.group(2)
              content = content.replace('<svg ', f'<svg width="{w}" height="{h}" ', 1)
              open(sys.argv[1], 'w').write(content)
              print(f"Fixed {w}x{h}: {sys.argv[1]}")
          PYEOF
            # Make the diagram adapt to dark mode through the <img> embed
            python3 tools/inject-diagram-darkmode.py "$out"
          done
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
