<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" width="960" height="660" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<style>@media (prefers-color-scheme: dark){.bg{fill:#111111}.ink{stroke:#cdd6e0}.inkf{fill:#cdd6e0}.err{stroke:#f0938b}.ok{stroke:#2dd4bf}.strong{fill:#e6edf3}.cap{fill:#9aa4b0}.okt{fill:#2dd4bf}}</style>
<defs><filter id="sketch" x="-8%" y="-8%" width="116%" height="116%"><feTurbulence type="turbulence" baseFrequency="0.022" numOctaves="3" seed="4" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="6.5"/></filter></defs>
<rect class="bg" width="960" height="660" fill="#fafaf9"/>
<text class="strong" x="480" y="34" text-anchor="middle" font-size="15.5" fill="#1f2937">Asked to draw a bike from memory, people miss the details in all sorts of ways. Regular cyclists included.</text>
<g transform="translate(40,50)" class="ink" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketch)"><circle cx="70" cy="170" r="52"/><circle cx="70" cy="170" r="44" stroke-width="1.4"/><circle cx="270" cy="170" r="52"/><circle cx="270" cy="170" r="44" stroke-width="1.4"/><path d="M70,170 L70,118 M70,170 L70,222 M70,170 L117,148 M70,170 L23,148 M70,170 L117,192 M70,170 L23,192" stroke-width="1.1"/><path d="M270,170 L270,118 M270,170 L270,222 M270,170 L317,148 M270,170 L223,148 M270,170 L317,192 M270,170 L223,192" stroke-width="1.1"/><circle class="inkf" cx="70" cy="170" r="3.5" fill="#1f2937"/><circle class="inkf" cx="270" cy="170" r="3.5" fill="#1f2937"/><path d="M132,182 L110,88"/><path d="M110,88 L232,102"/><path d="M132,182 L236,112"/><path d="M232,102 L236,112"/><path d="M236,112 L270,170"/><path d="M114,96 L70,170"/><path d="M132,182 L70,170"/><path d="M232,102 L230,86"/><path d="M216,84 L246,88" stroke-width="4"/><path d="M96,86 L128,90" stroke-width="5"/><path d="M132,182 L143,206"/><path d="M134,208 L152,207" stroke-width="4"/><circle cx="132" cy="182" r="11"/><path class="err" d="M70,112 L270,112 A58,58 0 0 1 270,228 L70,228 A58,58 0 0 1 70,112 Z" stroke="#c4554d" stroke-width="3" stroke-dasharray="6 3"/></g>
<text class="cap" x="210" y="300" text-anchor="middle" font-size="14" fill="#5b6573">the chain runs around both wheels</text>
<g transform="translate(510,50)" class="ink" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketch)"><circle cx="70" cy="170" r="52"/><circle cx="70" cy="170" r="44" stroke-width="1.4"/><circle cx="270" cy="170" r="52"/><circle cx="270" cy="170" r="44" stroke-width="1.4"/><path d="M70,170 L70,118 M70,170 L70,222 M70,170 L117,148 M70,170 L23,148 M70,170 L117,192 M70,170 L23,192" stroke-width="1.1"/><path d="M270,170 L270,118 M270,170 L270,222 M270,170 L317,148 M270,170 L223,148 M270,170 L317,192 M270,170 L223,192" stroke-width="1.1"/><circle class="inkf" cx="70" cy="170" r="3.5" fill="#1f2937"/><circle class="inkf" cx="270" cy="170" r="3.5" fill="#1f2937"/><path d="M132,182 L110,88"/><path d="M110,88 L232,102"/><path d="M132,182 L236,112"/><path d="M232,102 L236,112"/><path d="M236,112 L270,170"/><path d="M114,96 L70,170"/><path d="M132,182 L70,170"/><path d="M232,102 L230,86"/><path d="M216,84 L246,88" stroke-width="4"/><path d="M96,86 L128,90" stroke-width="5"/><path d="M132,182 L143,206"/><path d="M134,208 L152,207" stroke-width="4"/><circle cx="132" cy="182" r="11"/><path class="ok" d="M132,172 L74,162 Q64,170 74,178 L132,192 Q144,182 132,172 Z" stroke="#0f766e" stroke-width="3"/><path class="err" d="M110,88 L270,170" stroke="#c4554d" stroke-width="3"/></g>
<text class="cap" x="680" y="300" text-anchor="middle" font-size="14" fill="#5b6573">a frame bar pins the front wheel</text>
